version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:2.15.3-pg15
    environment:
      POSTGRES_USER: aeon
      POSTGRES_PASSWORD: aeon
      POSTGRES_DB: aeon
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeon"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    volumes:
      - ../backend:/app
    environment:
      DATABASE_URL: postgresql+psycopg2://aeon:aeon@postgres:5432/aeon
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    volumes:
      - ../backend:/app
    environment:
      DATABASE_URL: postgresql+psycopg2://aeon:aeon@postgres:5432/aeon
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A app.core.celery_app worker --loglevel=info

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_BASE: /api/v1
    ports:
      - "3000:3000"
    command: npm run dev

  mock_authority:
    build:
      context: ../mock_authority
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    command: uvicorn main:app --host 0.0.0.0 --port 8001

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  pg_data:
